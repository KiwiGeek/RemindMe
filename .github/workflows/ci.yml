name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel a previous in-flight run if the user force-pushes — the new
# commit is the only one we care about.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  check:
    name: lint · typecheck · test · build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint (biome)
        run: npm run lint

      - name: Typecheck (worker + web)
        run: npm run typecheck

      - name: Unit + integration tests (vitest, workers pool)
        run: npm test -- --run

      - name: Build (SPA + worker dry-run)
        run: npm run build
