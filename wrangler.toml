name = "remindme"
main = "src/index.ts"
compatibility_date = "2025-01-15"
compatibility_flags = ["nodejs_compat"]
workers_dev = true

# Custom domain. Requires `example.com` to be an active zone on this
# Cloudflare account (which it is). On `wrangler deploy`, Cloudflare:
#   1. Creates a proxied DNS record for `remindme.example.com`.
#   2. Issues a Universal SSL cert covering the hostname (first issuance
#      can take 30s – a few minutes; until then browsers see a TLS error).
#   3. Routes the hostname to this Worker.
# Distinct from a `routes = […]` entry on an existing zone — `custom_domain`
# handles the DNS + cert provisioning end-to-end.
routes = [
  { pattern = "remindme.example.com", custom_domain = true },
]

# Static SPA assets are served from this directory. The SPA build step
# (`npm run build:web`) populates it before deploys.
[assets]
directory = "./web/dist"
binding = "ASSETS"
not_found_handling = "single-page-application"

# Plaintext, non-secret runtime configuration.
[vars]
APP_NAME = "Remind Me"
SITE_ORIGIN = "https://remindme.example.com"
MAILGUN_REGION = "us"
MAILGUN_DOMAIN = "example.com"
MAILGUN_FROM = "Remind Me <reminders@example.com>"
MAILGUN_REPLY_TO = "no-reply@example.com"
# Comma-separated; case-insensitive. Anyone signed in with one of these
# addresses sees `/admin` in the SPA and can hit `/api/admin/*`.
ADMIN_EMAILS = "admin@example.com"

# Secrets (set via `wrangler secret put <NAME>`):
#   MAILGUN_API_KEY        - private Mailgun sending API key
#   MAILGUN_SIGNING_KEY    - HTTP webhook signing key
#   SESSION_SECRET         - HMAC key for session cookies
#   OTP_PEPPER             - HMAC pepper for OTP code storage
#   ACTION_TOKEN_SECRET    - HMAC key for email action URLs

# D1 binding. The database is created with:
#   npx wrangler d1 create remindme
# then paste the returned id below.
[[d1_databases]]
binding = "DB"
database_name = "remindme"
database_id = "ea8256b9-bcd7-4d53-839d-cddcc6da1d94"
migrations_dir = "migrations"

# KV namespace for OTPs and rate-limit counters. Create with:
#   npx wrangler kv namespace create KV
# and paste the returned id below.
[[kv_namespaces]]
binding = "KV"
id = "0025dd3db7864577ab726877e31ee15a"

# 1-minute scheduler tick.
[triggers]
# Cloudflare Workers free tier guarantees ~5-minute cron granularity. The
# scheduler queries a 6-minute look-ahead window so reminders always fire on
# or before their scheduled minute even when ticks jitter slightly late.
crons = ["*/5 * * * *"]

[observability.logs]
enabled = true
